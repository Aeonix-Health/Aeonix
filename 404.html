  });
</script>

})(window,document,'script','dataLayer','GTM-T44V76GK');</script>

<!-- vanilla-cookieconsent JS + config -->
<script src="https://cdn.jsdelivr.net/gh/orestbida/cookieconsent@3.0.1/dist/cookieconsent.umd.js"></script>
<script>
  CookieConsent.run({
    autoShow: true,
    revision: 1,
    cookie: {
      name: 'cc_cookie',
      expiresAfterDays: 365,
    },
    onConsent: function({ cookie }) {
      if (CookieConsent.acceptedCategory('analytics')) {
        gtag('consent', 'update', { analytics_storage: 'granted' });
        dataLayer.push({ event: 'cookie_consent_analytics' });
      }
      if (CookieConsent.acceptedCategory('marketing')) {
        gtag('consent', 'update', { ad_storage: 'granted' });
      }
    },
    onChange: function({ cookie }) {
      const analyticsGranted = CookieConsent.acceptedCategory('analytics');
      gtag('consent', 'update', {
        analytics_storage: analyticsGranted ? 'granted' : 'denied'
      });
    },
    categories: {
      necessary: {
        enabled: true,
        readOnly: true
      },
      analytics: {
        enabled: false,
        autoClear: {
          cookies: [
            { name: /^_ga/ },
            { name: '_gid' }
          ]
        }
      },
      marketing: {
        enabled: false
      }
    },
    language: {
      default: 'en',
      translations: {
        en: {
          consentModal: {
            title: 'We use cookies 🍪',
            description: 'We use cookies to analyze traffic and improve your experience.',
            acceptAllBtn: 'Accept all',
            acceptNecessaryBtn: 'Reject all',
            showPreferencesBtn: 'Manage preferences'
          },
          preferencesModal: {
            title: 'Cookie Preferences',
            acceptAllBtn: 'Accept all',
            acceptNecessaryBtn: 'Reject all',
            savePreferencesBtn: 'Save preferences',
            sections: [
              {
                title: 'Necessary Cookies',
                description: 'Required for the site to function. Cannot be disabled.',
                linkedCategory: 'necessary'
              },
              {
                title: 'Analytics Cookies',
                description: 'Help us understand how visitors use the site (Google Analytics).',
                linkedCategory: 'analytics'
              },
              {
                title: 'Marketing Cookies',
                description: 'Used for targeted advertising.',
                linkedCategory: 'marketing'
              }
            ]
          }
        }
      }
    }
  });
</script>
</body>
</html>
